services:
  portfolio:
    image: ${PORTFOLIO_IMAGE:-ghcr.io/jamesabilong/james-abilong-portfolio:latest}
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: james-abilong-portfolio
    restart: unless-stopped
    ports:
      - "${PORTFOLIO_HTTP_PORT:-127.0.0.1:8080}:80"
    environment:
      - SERVER_NAME=${SERVER_NAME:-_}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
